# MarketAI — Sector Mapping (manual)
#
# Each ticker is mapped to ONE sector. This is the SINGLE SOURCE OF TRUTH
# for the Sector Cap gate (R1). Edit this file (no code change needed)
# when adding tickers to the universe.
#
# Sectors and their cap percentages (used by R1) live in config.yaml
# under risk_gates.sector_cap.sector_overrides.
#
# Spec: scratchpad v1.1 — section 1 (R1), section 4 (YAML), section 7 (decision #4).

