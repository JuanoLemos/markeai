{% extends "base.html" %}
{% block content %}
<h1>Logs</h1>
<div class="btn-group">
  <button class="btn" onclick="document.getElementById('log-output').scrollTop = 0">Ir arriba</button>
  <button class="btn" onclick="document.getElementById('log-output').scrollTop = document.getElementById('log-output').scrollHeight">Ir abajo</button>
</div>
<pre class="log" id="log-output">Cargando...</pre>
{% endblock %}

{% block scripts %}
<script>
async function load() {
  const l = await api('/api/logs');
  document.getElementById('log-output').textContent = l.lines || 'Sin logs';
}
load();
setInterval(load, 5000);
</script>
{% endblock %}
