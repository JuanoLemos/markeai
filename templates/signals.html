{% extends "base.html" %}
{% block content %}
<h1>Señales</h1>

<div class="filter-bar">
  <span class="text-muted" style="font-size:12px;align-self:center">Decisión:</span>
  <button class="chip active" data-filter="decision" data-val="ALL">Todas</button>
  <button class="chip" data-filter="decision" data-val="LONG">LONG</button>
  <button class="chip" data-filter="decision" data-val="SHORT">SHORT</button>
  <button class="chip" data-filter="decision" data-val="WAIT">WAIT</button>
  <span class="text-muted" style="font-size:12px;align-self:center;margin-left:16px">Mercado:</span>
  <button class="chip active" data-filter="market" data-val="ALL">Todos</button>
  <button class="chip" data-filter="market" data-val="polymarket">Polymarket</button>
  <button class="chip" data-filter="market" data-val="forex">Forex</button>
  <button class="chip" data-filter="market" data-val="stocks">Stocks</button>
</div>

<div class="text-muted mb-2" style="font-size:12px">
  <span id="result-count">—</span> señales · click en una fila para ver el desglose por capa
</div>

<div class="section">
  <table id="signals-table"><tr><td colspan="6"><div class="empty-state">Cargando…</div></td></tr></table>
</div>
{% endblock %}

{% block scripts %}
<script>
let allSignals = [];
const filters = { decision: 'ALL', market: 'ALL' };

function render() {
  const filtered = allSignals.filter(s =>
    (filters.decision === 'ALL' || s.decision === filters.decision) &&
    (filters.market === 'ALL' || s.market === filters.market)
  );
  document.getElementById('result-count').textContent = filtered.length;
  const t = document.getElementById('signals-table');
  if (!filtered.length) {
    t.innerHTML = '<tr><td colspan="6"><div class="empty-state">Sin señales que coincidan con los filtros</div></td></tr>';
    return;
  }
  t.innerHTML = `<tr><th>Hora</th><th>Mercado</th><th>Ticker</th><th>Decisión</th><th>Confianza</th><th>Razonamiento</th></tr>` +
    filtered.map(s => `
      <tr class="expandable" data-id="${s.id}">
        <td>${(s.timestamp||'').slice(11,19)}</td>
        <td>${s.market}</td>
        <td>${s.ticker}</td>
        <td class="signal-${s.decision}">${s.decision}</td>
        <td>${s.confidence}</td>
        <td class="text-muted">${(s.reasoning||'').slice(0,60)}</td>
      </tr>
      <tr class="expand-row" id="exp-${s.id}" style="display:none"><td colspan="6"></td></tr>
    `).join('');
  document.querySelectorAll('tr.expandable').forEach(row => {
    row.addEventListener('click', () => toggleExpand(row.dataset.id));
  });
}

async function toggleExpand(id) {
  const exp = document.getElementById('exp-' + id);
  const row = document.querySelector(`tr.expandable[data-id="${id}"]`);
  if (exp.style.display === 'table-row') {
    exp.style.display = 'none';
    row.classList.remove('expanded');
    return;
  }
  exp.style.display = 'table-row';
  row.classList.add('expanded');
  const cell = exp.querySelector('td');
  cell.innerHTML = '<div class="expand-content">Cargando desglose…</div>';
  const detail = await api('/api/signals/' + id);
  const layers = detail.layer_scores || {};
  const keys = Object.keys(layers);
  if (!keys.length) {
    cell.innerHTML = '<div class="expand-content">Sin desglose por capa para esta señal.</div>';
    return;
  }
  const rows = keys.map(name => {
    const l = layers[name];
    const score = l.score ?? 50;
    const pct = Math.max(0, Math.min(100, score));
    const sig = l.signal || 'WAIT';
    const w = l.weight ? (l.weight * 100).toFixed(0) + '%' : '—';
    return `<div class="layer-row">
      <span class="layer-name">${name}</span>
      <span class="signal-${sig}">${sig}</span>
      <span>${score}</span>
      <span class="text-muted">w: ${w}</span>
      <div class="score-bar"><div class="fill" style="width:${pct}%;background:${score>=55?'var(--accent-green)':score<=45?'var(--accent-red)':'var(--accent-wait)'}"></div></div>
    </div>`;
  }).join('');
  cell.innerHTML = `<div class="expand-content">
    <div style="margin-bottom:8px;color:var(--text)"><strong>Capas que contribuyeron (${keys.length}):</strong></div>
    ${rows}
    ${detail.reasoning ? `<div style="margin-top:12px;padding-top:8px;border-top:1px solid var(--border)"><strong>Razonamiento:</strong> ${detail.reasoning}</div>` : ''}
  </div>`;
}

document.querySelectorAll('.chip').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    document.querySelectorAll(`.chip[data-filter="${f}"]`).forEach(b => {
      b.classList.remove('active', 'short', 'wait');
    });
    btn.classList.add('active');
    if (f === 'decision') {
      if (btn.dataset.val === 'SHORT') btn.classList.add('short');
      if (btn.dataset.val === 'WAIT') btn.classList.add('wait');
    }
    filters[f] = btn.dataset.val;
    render();
  });
});

async function load() {
  allSignals = await api('/api/signals');
  render();
}
load(); setInterval(load, 10000);
</script>
{% endblock %}
