{% extends "base.html" %}
{% block content %}
<h1>📰 Noticias & Sentiment</h1>

<div class="cards" id="news-summary" style="margin-bottom:16px"></div>

<div class="filter-bar">
  <strong style="color:var(--text-muted);font-size:12px;align-self:center">Mercado:</strong>
  <button class="chip chip-active" onclick="setFilter('market','all',this)">Todos</button>
  <button class="chip" onclick="setFilter('market','forex',this)">📈 Forex</button>
  <button class="chip" onclick="setFilter('market','stocks',this)">💹 Stocks</button>
  <button class="chip" onclick="setFilter('market','crypto',this)">₿ Crypto</button>
  <span style="width:16px"></span>
  <strong style="color:var(--text-muted);font-size:12px;align-self:center">Sentiment:</strong>
  <button class="chip" onclick="setFilter('sentiment','all',this)" id="chip-sent-all" style="background:var(--accent-blue);color:#fff;border-color:var(--accent-blue);font-weight:600">Todos</button>
  <button class="chip" onclick="setFilter('sentiment','bullish',this)">🟢 Bullish</button>
  <button class="chip" onclick="setFilter('sentiment','bearish',this)">🔴 Bearish</button>
  <button class="chip" onclick="setFilter('sentiment','neutral',this)">⚪ Neutral</button>
</div>

<div id="news-list" style="display:flex;flex-direction:column;gap:10px">
  <div class="empty-state">Cargando noticias...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
let _filters = { market: 'all', sentiment: 'all' };
let _filterGroups = { market: null, sentiment: null };

function setFilter(group, val, btn) {
  _filters[group] = val;
  const prefix = group === 'market' ? ['all','forex','stocks','crypto'] : ['all','bullish','bearish','neutral'];
  document.querySelectorAll('.filter-bar .chip').forEach(c => {
    if (prefix.some(v => c.textContent.toLowerCase().includes(v) || c.getAttribute('onclick')?.includes(`'${v}'`))) {
      const inGroup = c.getAttribute('onclick')?.includes(`'${group}'`);
      if (inGroup) c.classList.remove('chip-active');
    }
  });
  btn.classList.add('chip-active');
  loadNews();
}

const SENT_ICON = { bullish: '🟢', bearish: '🔴', neutral: '⚪' };
const SENT_COLOR = { bullish: 'var(--accent-green)', bearish: 'var(--accent-red)', neutral: 'var(--text-muted)' };

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

async function loadNews() {
  const params = new URLSearchParams({ market: _filters.market, sentiment: _filters.sentiment });
  const d = await api('/api/news?' + params);

  // summary bar
  const total = d.total || 0;
  const pctBull = total ? Math.round((d.bullish||0)/total*100) : 0;
  const pctBear = total ? Math.round((d.bearish||0)/total*100) : 0;
  const pctNeut = 100 - pctBull - pctBear;
  const moodLabel = pctBull > 55 ? '😀 Mercado optimista' : pctBear > 55 ? '😟 Mercado pesimista' : '😐 Sentimiento mixto';
  document.getElementById('news-summary').innerHTML = `
    <div class="card" title="Mood general basado en el sentimiento de las noticias recientes">
      <div class="label">Mood del mercado</div>
      <div class="value" style="font-size:20px">${moodLabel}</div>
    </div>
    <div class="card">
      <div class="label">Noticias (últimas 24h)</div>
      <div class="value">${total}</div>
    </div>
    <div class="card">
      <div class="label">Bullish / Bearish / Neutral</div>
      <div style="margin-top:8px;height:12px;border-radius:6px;overflow:hidden;display:flex;background:var(--bg-hover)">
        <div style="width:${pctBull}%;background:var(--accent-green);transition:width .4s"></div>
        <div style="width:${pctBear}%;background:var(--accent-red);transition:width .4s"></div>
        <div style="flex:1;background:var(--border)"></div>
      </div>
      <div style="display:flex;gap:12px;margin-top:6px;font-size:12px">
        <span class="green">▲ ${d.bullish||0}</span>
        <span class="red">▼ ${d.bearish||0}</span>
        <span style="color:var(--text-muted)">● ${d.neutral||0}</span>
      </div>
    </div>
  `;

  const list = document.getElementById('news-list');
  const articles = d.articles || [];
  if (!articles.length) {
    list.innerHTML = `<div class="empty-state">
      Sin noticias disponibles. Las noticias se cargan cuando el bot corre su loop.<br>
      <span style="font-size:12px;margin-top:8px;display:block">Verifica que NewsAPI / CryptoPanic estén configurados en .env</span>
    </div>`;
    return;
  }

  list.innerHTML = articles.map(a => {
    const sent = a.sentiment || 'neutral';
    const icon = SENT_ICON[sent] || '⚪';
    const borderColor = SENT_COLOR[sent] || 'var(--border)';
    const desc = (a.description || '').slice(0, 160) + ((a.description||'').length > 160 ? '…' : '');
    return `<div style="background:var(--bg-card);border:1px solid var(--border);border-left:4px solid ${borderColor};border-radius:8px;padding:14px 16px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div style="flex:1">
          <a href="${a.url||'#'}" target="_blank" rel="noopener" style="color:var(--text);font-weight:600;font-size:14px;text-decoration:none;line-height:1.4;display:block"
             onmouseover="this.style.color='var(--accent-blue)'" onmouseout="this.style.color='var(--text)'">${a.title||'Sin título'}</a>
          ${desc ? `<div style="color:var(--text-muted);font-size:12px;margin-top:6px;line-height:1.5">${desc}</div>` : ''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:18px" title="Sentiment: ${sent}">${icon}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px">${timeAgo(a.published_at)}</div>
        </div>
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--text-muted);display:flex;gap:12px">
        <span>📰 ${a.source||'Desconocido'}</span>
        ${a.published_at ? `<span>${a.published_at.slice(0,10)}</span>` : ''}
        <span style="color:${borderColor};text-transform:uppercase;font-weight:600">${sent}</span>
      </div>
    </div>`;
  }).join('');
}

loadNews();
</script>
{% endblock %}
