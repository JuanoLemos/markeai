{% extends "base.html" %}
{% block title %}Sandbox{% endblock %}
{% block content %}

<div class="ph">
  <div class="ph-left">
    <div class="ph-title">🧪 Sandbox — Debug & Test</div>
    <div class="ph-sub">Inyectá señales sintéticas, manipulá el broker y monitoreá el sistema en vivo</div>
  </div>
</div>

<div class="grid-2">
  <!-- Inject Signal -->
  <div class="panel">
    <div class="panel-header">📡 Inyectar señal</div>
    <div class="panel-body" style="display:flex;flex-direction:column;gap:10px">
      <div class="form-row"><label>Mercado</label><select id="inject-market"><option>forex</option><option>stocks</option><option>polymarket</option></select></div>
      <div class="form-row"><label>Ticker</label><input id="inject-ticker" value="EURUSD=X"></div>
      <div class="form-row"><label>Decisión</label><select id="inject-decision"><option>LONG</option><option>SHORT</option><option>WAIT</option></select></div>
      <div class="form-row"><label>Confianza</label><input id="inject-conf" type="number" value="65" min="0" max="100"></div>
      <div class="form-row"><label>Precio</label><input id="inject-price" type="number" step="0.0001" value="1.05"></div>
      <div class="form-row"><label>Perfil</label><select id="inject-profile"><option>normal</option><option>fast</option></select></div>
      <div class="form-row"><label>SL %</label><input id="inject-sl" type="number" step="0.1" value="2.0"></div>
      <div class="form-row"><label>TP %</label><input id="inject-tp" type="number" step="0.1" value="5.0"></div>
      <div class="form-row"><label>Tamaño $</label><input id="inject-size" type="number" value="50"></div>
      <div class="flex gap-2" style="margin-top:6px">
        <button class="btn btn-primary" onclick="injectSignal(false)" style="flex:1">💾 Solo señal</button>
        <button class="btn btn-primary" onclick="injectSignal(true)" style="flex:1">🚀 Señal + Broker</button>
      </div>
      <div id="inject-result" style="font-size:13px;margin-top:6px"></div>
    </div>
  </div>

  <!-- Broker controls -->
  <div class="panel">
    <div class="panel-header">💰 Control de broker</div>
    <div class="panel-body" style="display:flex;flex-direction:column;gap:10px">
      <div class="form-row"><label>Reset perfil</label><select id="reset-profile"><option value="all">Ambos</option><option value="normal">Normal</option><option value="fast">Fast</option></select></div>
      <button class="btn btn-danger" onclick="resetBroker()">🔄 Reset broker a $1000</button>
      <div id="reset-result" style="font-size:13px;margin-top:6px"></div>
      <hr style="border-color:var(--line);margin:8px 0">
      <button class="btn btn-warn" onclick="clearMotors()">🧹 Limpiar heartbeats</button>
      <div id="clear-result" style="font-size:13px;margin-top:6px"></div>
    </div>
  </div>
</div>

<!-- Debug output -->
<div class="section">
  <div class="section-h"><h2>🔍 Debug info</h2></div>
  <div class="panel">
    <div class="panel-body">
      <pre id="debug-output" style="font-size:12px;line-height:1.6;max-height:500px;overflow:auto;white-space:pre-wrap;background:var(--bg-3);padding:16px;border-radius:8px">Cargando…</pre>
      <button class="btn" onclick="loadDebug()" style="margin-top:10px">🔄 Refrescar</button>
    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
async function loadDebug(){
  const el=document.getElementById('debug-output');
  el.textContent='Cargando…';
  const r=await fetch('/api/debug');
  el.textContent=JSON.stringify(await r.json(),null,2);
}
async function injectSignal(toBroker){
  const el=document.getElementById('inject-result');
  el.textContent='Enviando…';
  const body={
    market: document.getElementById('inject-market').value,
    ticker: document.getElementById('inject-ticker').value,
    decision: document.getElementById('inject-decision').value,
    confidence: parseInt(document.getElementById('inject-conf').value),
    profile: document.getElementById('inject-profile').value,
    price: parseFloat(document.getElementById('inject-price').value),
    sl_pct: parseFloat(document.getElementById('inject-sl').value),
    tp_pct: parseFloat(document.getElementById('inject-tp').value),
    size_usd: parseFloat(document.getElementById('inject-size').value),
    trigger_broker: toBroker,
  };
  const r=await fetch('/api/debug/inject-signal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const j=await r.json();
  el.innerHTML=j.ok?'✅ '+JSON.stringify(j):'❌ '+(j.error||'Error');
}
async function resetBroker(){
  const el=document.getElementById('reset-result');
  el.textContent='Reseteando…';
  const r=await fetch('/api/debug/reset-broker',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile:document.getElementById('reset-profile').value})});
  const j=await r.json();
  el.innerHTML=j.ok?'✅ Reset: '+j.reset.join(', '):'❌ '+(j.error||'Error');
  loadDebug();
}
async function clearMotors(){
  const el=document.getElementById('clear-result');
  el.textContent='Limpiando…';
  await fetch('/api/debug/motors-clear',{method:'POST'});
  el.innerHTML='✅ Heartbeats limpiados';
  loadDebug();
}
document.addEventListener('DOMContentLoaded',loadDebug);
</script>
{% endblock %}
