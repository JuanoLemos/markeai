<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketAI — {% block title %}Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('mai-theme')||'dark');</script>
</head>
<body>

<!-- Mobile toggle -->
<button class="menu-toggle" id="mob-btn" data-tip="Menú">☰</button>
<div class="mob-overlay" id="mob-overlay"></div>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">

  <div class="sb-brand">
    <div class="sb-logo">📊</div>
    <div>
      <div class="sb-name">servermktai</div>
      <div class="sb-sub">v{{ app_version }} · Tu bot de trading</div>
    </div>
  </div>

  <div class="sb-nav">
    <div class="sb-section">Principal</div>
    <a href="/"          class="sb-link {% if page=='overview' %}active{% endif %}"><span class="sb-icon">🏠</span> Inicio</a>
    <a href="/signals"   class="sb-link {% if page=='signals' %}active{% endif %}"><span class="sb-icon">⚡</span> Señales</a>
    <a href="/trades"    class="sb-link {% if page=='trades' %}active{% endif %}"><span class="sb-icon">💼</span> Operaciones</a>

    <div class="sb-section" style="margin-top:6px">Análisis</div>
    <a href="/analytics" class="sb-link {% if page=='analytics' %}active{% endif %}"><span class="sb-icon">📈</span> Estadísticas</a>
    <a href="/watchlist" class="sb-link {% if page=='watchlist' or page=='ticker' %}active{% endif %}"><span class="sb-icon">👁</span> Seguimiento</a>
    <a href="/news"      class="sb-link {% if page=='news' %}active{% endif %}"><span class="sb-icon">📰</span> Noticias</a>
    <a href="/backtest"  class="sb-link {% if page=='backtest' %}active{% endif %}"><span class="sb-icon">🔬</span> Simulación</a>

    <div class="sb-section" style="margin-top:6px">Sistema</div>
    <a href="/config"    class="sb-link {% if page=='config' %}active{% endif %}"><span class="sb-icon">⚙️</span> Configuración</a>
    <a href="/logs"      class="sb-link {% if page=='logs' %}active{% endif %}"><span class="sb-icon">📋</span> Registros</a>
  </div>

  <!-- Bot status -->
  <div class="sb-status" id="sb-status">
    <div class="sb-dot" id="sb-dot"></div>
    <span class="sb-status-text" id="sb-status-txt">Verificando…</span>
  </div>

  <!-- Theme picker -->
  <div class="sb-themes">
    <div class="sb-themes-label">Tema</div>
    <div class="theme-dots">
      <div class="theme-dot" data-theme="dark"      style="background:#171b26;border-color:#2a3147" data-tip="Oscuro"></div>
      <div class="theme-dot" data-theme="light"     style="background:#f4f6fb;border-color:#9ba3be" data-tip="Claro"></div>
      <div class="theme-dot" data-theme="bloomberg" style="background:#0d0d0d;border-color:#ff8c00" data-tip="Bloomberg"></div>
      <div class="theme-dot" data-theme="mint"      style="background:#0f2218;border-color:#00e5a0" data-tip="Mint"></div>
      <div class="theme-dot" data-theme="cyber"     style="background:#10002e;border-color:#00ffcc" data-tip="Cyberpunk"></div>
      <div class="theme-dot" data-theme="sol"       style="background:#fdf6e3;border-color:#2aa198" data-tip="Solarized"></div>
    </div>
  </div>
</nav>

<!-- Content -->
<main class="main" id="app">
  {% block content %}{% endblock %}
</main>

<script>
/* ── Global API helper ── */
async function api(url, opts) {
  try {
    const r = await fetch(url, opts);
    if (!r.ok) return {};
    return r.json();
  } catch { return {}; }
}

/* ── Layer labels ── */
const L_EMOJI = {
  technical:'📊',onchain:'⛓️',on_chain:'⛓️',sentiment:'💬',
  orderbook:'📋',order_book:'📋',fundamental:'🏢',macro:'🌍',
  cross_asset:'🔗',crossasset:'🔗',ict:'📐',ict_smc:'📐',
};
function layerLabel(name) {
  const k = (name||'').toLowerCase().replace(/[^a-z_]/g,'');
  return (L_EMOJI[k]||'🔹') + ' ' + name;
}

/* ── Friendly number helpers ── */
function fmtPnl(v) {
  const sign = v >= 0 ? '+' : '';
  return `${sign}$${Math.abs(v).toFixed(2)}`;
}
function pnlClass(v) { return v > 0 ? 'c-pos' : v < 0 ? 'c-neg' : 'text-muted'; }
function confPill(c) {
  const cls = c >= 70 ? 'hi' : c >= 50 ? 'mid' : 'lo';
  const lbl = c >= 70 ? '🔥 Alta' : c >= 50 ? '👍 Media' : '⚠️ Baja';
  return `<span class="conf-pill ${cls}">${c}% ${lbl}</span>`;
}
function friendlyTicker(t) {
  const slugs = {
    'will-the-fdv-of-openseas-token-1-week-after-launch-be-above-blurs-fdv': 'OpenSea > Blur? (1sem)',
    'will-the-fdv-of-openseas-token-be-a-b5': 'OpenSea FDV > $5b?',
    'will-the-fdv-of-openseas-token-be-a-10b': 'OpenSea FDV > $10b?',
    'will-the-fdv-of-openseas-token-be-a-15b': 'OpenSea FDV > $15b?',
    'will-gpt-4-have-500b-parameters': 'GPT-4 > 500B params?',
    'will-julie-su-be-the-next-us-secret': 'Julie Su labor secretary?',
    'will-tim-ryan-be-the-next-secretary': 'Tim Ryan labor secretary?',
    'will-the-fed-cut-rates-in-2023': 'Fed cut rates 2023?',
    'will-there-be-a-senate-vacancy-in-p': 'PA Senate vacancy?',
    'will-trump-win-the-2024-iowa-caucus': 'Trump wins Iowa 2024?',
  };
  return slugs[t] || t;
}
function timeAgo(iso) {
  if (!iso) return '—';
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60)    return s + 's';
  if (s < 3600)  return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h';
  return Math.floor(s/86400) + 'd';
}
const MKT_ICON = {forex:'📈',stocks:'💹',polymarket:'🎲',crypto:'₿'};

/* ── Theme ── */
(function(){
  const t = localStorage.getItem('mai-theme')||'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active',d.dataset.theme===t));
})();
document.querySelectorAll('.theme-dot').forEach(d=>{
  d.addEventListener('click',()=>{
    const t = d.dataset.theme;
    document.documentElement.setAttribute('data-theme',t);
    localStorage.setItem('mai-theme',t);
    document.querySelectorAll('.theme-dot').forEach(x=>x.classList.toggle('active',x.dataset.theme===t));
  });
});

/* ── Mobile sidebar ── */
function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('mob-overlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('mob-overlay').classList.remove('open'); }
document.getElementById('mob-btn').addEventListener('click', openSidebar);
document.getElementById('mob-overlay').addEventListener('click', closeSidebar);
document.querySelectorAll('.sb-link').forEach(a=>a.addEventListener('click',closeSidebar));

/* ── Sidebar bot status ── */
async function refreshSbStatus() {
  const s = await api('/api/status');
  const dot = document.getElementById('sb-dot');
  const txt = document.getElementById('sb-status-txt');
  if (!dot) return;
  const on = s && s.running;
  dot.className = 'sb-dot' + (on?' on':'');
  txt.textContent = on ? 'Bot activo' : 'Bot detenido';
}
refreshSbStatus();
setInterval(refreshSbStatus, 12000);
</script>
{% block scripts %}{% endblock %}
</body></html>
