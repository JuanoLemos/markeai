<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketAI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
  <nav class="sidebar">
    <h2>MarketAI</h2>
    <a href="/" class="{% if page == 'overview' %}active{% endif %}">Overview</a>
    <a href="/signals" class="{% if page == 'signals' %}active{% endif %}">Señales</a>
    <a href="/trades" class="{% if page == 'trades' %}active{% endif %}">Trades</a>
    <a href="/analytics" class="{% if page == 'analytics' %}active{% endif %}">Analytics</a>
    <a href="/backtest" class="{% if page == 'backtest' %}active{% endif %}">Backtest</a>
    <a href="/config" class="{% if page == 'config' %}active{% endif %}">Config</a>
    <a href="/logs" class="{% if page == 'logs' %}active{% endif %}">Logs</a>
  </nav>
  <div class="main" id="app">
    {% block content %}{% endblock %}
  </div>
  <script>
    async function api(url) {
      const r = await fetch(url);
      return r.json();
    }
    // cerrar sidebar mobile al navegar
    document.querySelectorAll('.sidebar a').forEach(a => {
      a.addEventListener('click', () => document.querySelector('.sidebar').classList.remove('open'));
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
