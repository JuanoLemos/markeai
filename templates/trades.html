{% extends "base.html" %}
{% block title %}Operaciones{% endblock %}
{% block content %}

<div class="ph">
  <div class="ph-left">
    <div class="ph-title">💼 Operaciones</div>
    <div class="ph-sub">Historial completo de todas las compras y ventas que realizó el bot</div>
  </div>
  <span id="tr-count" style="font-size:13px;color:var(--ink-2)"></span>
</div>

<!-- Summary KPIs -->
<div class="kpi-grid" id="tr-kpis" style="margin-bottom:20px"></div>

<div class="filters">
  <span class="filter-lbl">Estado</span>
  <button class="chip on" data-f="status" data-v="ALL">Todas</button>
  <button class="chip"    data-f="status" data-v="open">🟡 En curso</button>
  <button class="chip"    data-f="status" data-v="closed">⬜ Cerradas</button>
  <div class="filter-sep"></div>
  <span class="filter-lbl">Resultado</span>
  <button class="chip on" data-f="result" data-v="ALL">Todos</button>
  <button class="chip"    data-f="result" data-v="win">✅ Ganadas</button>
  <button class="chip"    data-f="result" data-v="loss">❌ Perdidas</button>
  <div class="filter-sep"></div>
  <span class="filter-lbl">Perfil</span>
  <button class="chip on" data-f="profile" data-v="ALL">Todos</button>
  <button class="chip"    data-f="profile" data-v="normal">🟢 Normal</button>
  <button class="chip"    data-f="profile" data-v="fast">🔵 Rápido</button>
</div>

<div class="panel">
  <table id="tr-tbl"><tr><td><div class="load-center"><div class="spinner"></div></div></td></tr></table>
</div>

{% endblock %}
{% block scripts %}
<script>
let allTrades=[], filters={status:'ALL',result:'ALL',profile:'ALL'};
function getProf(t){const s=t.strategy_used||'';return s.startsWith('normal_')?'normal':s.startsWith('fast_')?'fast':'—';}

function render(){
  const f=allTrades.filter(t=>{
    if(filters.status!=='ALL'&&t.status!==filters.status)return false;
    if(filters.result==='win'&&!(t.pnl_usd>0))return false;
    if(filters.result==='loss'&&!(t.pnl_usd<0))return false;
    if(filters.profile!=='ALL'&&getProf(t)!==filters.profile)return false;
    return true;
  });
  document.getElementById('tr-count').textContent=f.length+' operaci'+(f.length===1?'ón':'ones');

  const closed=allTrades.filter(t=>t.status==='closed'&&t.pnl_usd!=null);
  const wins=closed.filter(t=>t.pnl_usd>0), losses=closed.filter(t=>t.pnl_usd<0);
  const tot=closed.reduce((a,t)=>a+(t.pnl_usd||0),0);
  const wr=closed.length?(wins.length/closed.length*100).toFixed(1):0;
  document.getElementById('tr-kpis').innerHTML=`
    <div class="kpi kpi-info"><div class="kpi-label">Total</div><div class="kpi-value">${allTrades.length}</div><div class="kpi-sub">${allTrades.filter(t=>t.status==='open').length} en curso ahora</div></div>
    <div class="kpi kpi-${parseFloat(wr)>=50?'pos':'neg'}"><div class="kpi-label">Tasa de aciertos</div><div class="kpi-value ${parseFloat(wr)>=50?'pos':'neg'}">${wr}%</div><div class="kpi-sub">${wins.length} ganadas / ${losses.length} perdidas</div></div>
    <div class="kpi kpi-${tot>=0?'pos':'neg'}"><div class="kpi-label">Ganancia acumulada</div><div class="kpi-value ${tot>=0?'pos':'neg'}">${tot>=0?'+':''}$${Math.abs(tot).toFixed(2)}</div><div class="kpi-sub">${tot>=0?'🎉 Vas ganando':'😟 Vas perdiendo'}</div></div>
    <div class="kpi kpi-info"><div class="kpi-label">Cerradas</div><div class="kpi-value">${closed.length}</div><div class="kpi-sub">${wins.length} éxitos · ${losses.length} pérdidas</div></div>`;

  const tbl=document.getElementById('tr-tbl');
  if(!f.length){tbl.innerHTML='<tr><td colspan="8"><div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Sin operaciones con esos filtros</div></div></td></tr>';return;}
  tbl.innerHTML=`<tr><th>Fecha</th><th>Perfil</th><th>Mercado</th><th>Activo</th><th>Señal</th><th>Entrada</th><th>Salida</th><th>Resultado</th></tr>`+
    f.map(r=>{
      const isOpen=r.status==='open', win=r.pnl_usd>0, loss=r.pnl_usd<0;
      const prof=getProf(r), mkt=(r.market||'').replace(/^(normal|fast)_/,'');
      return `<tr>
        <td class="text-faint" style="font-size:12px">${(r.exit_time||r.entry_time||'').slice(0,10)}</td>
        <td><span class="tag tag-${prof==='normal'?'normal':'fast'}">${prof==='normal'?'Normal':'Rápido'}</span></td>
        <td>${MKT_ICON[mkt]||''} ${mkt}</td>
        <td><strong class="ticker-cell" data-tip="${r.ticker}">${friendlyTicker(r.ticker)}</strong></td>
        <td><span class="tag tag-${r.signal.toLowerCase()}">${r.signal==='LONG'?'▲ Largo':'▼ Corto'}</span></td>
        <td class="mono" style="font-size:12px">$${r.entry_price}</td>
        <td class="mono" style="font-size:12px">${r.exit_price?'$'+r.exit_price:'—'}</td>
        <td>${isOpen
          ? '<span class="tag tag-open">⏳ En curso</span>'
          : r.pnl_usd!=null
            ? `<span class="tag tag-${win?'win':'loss'}">${win?'✅':' ❌'} ${win?'+':''}$${r.pnl_usd.toFixed(2)}</span>`
            : '—'}</td>
      </tr>`;
    }).join('');
}

document.querySelectorAll('.chip[data-f]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll(`.chip[data-f="${btn.dataset.f}"]`).forEach(b=>b.classList.remove('on','on-neg'));
    btn.classList.add(btn.dataset.v==='loss'?'on-neg':'on');
    filters[btn.dataset.f]=btn.dataset.v; render();
  });
});

async function load(){allTrades=await api('/api/trades')||[];render();}
document.addEventListener('marketai-refresh', () => { load(); });
load(); setInterval(load,15000);
</script>
{% endblock %}
