<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketAI — {% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('mai-theme')||'dark');</script>
</head>
<body>

<button class="mob-toggle" id="mob-btn">&#9776;</button>
<div class="mob-overlay" id="mob-ov"></div>

<nav class="sidebar" id="sidebar">
  <div class="sb-logo">M</div>

  <div class="sb-nav">
    <a href="/"          class="sb-link {% if page=='overview' %}active{% endif %}"><span class="sb-icon">&#x1F3E0;</span><span class="sb-label">Inicio</span></a>
    <a href="/signals"   class="sb-link {% if page=='signals' %}active{% endif %}"><span class="sb-icon">&#x26A1;</span><span class="sb-label">Se&ntilde;ales</span></a>
    <a href="/trades"    class="sb-link {% if page=='trades' %}active{% endif %}"><span class="sb-icon">&#x1F4BC;</span><span class="sb-label">Operaciones</span></a>
    <a href="/analytics" class="sb-link {% if page=='analytics' %}active{% endif %}"><span class="sb-icon">&#x1F4C8;</span><span class="sb-label">Estad&iacute;sticas</span></a>
    <a href="/watchlist" class="sb-link {% if page=='watchlist' or page=='ticker' %}active{% endif %}"><span class="sb-icon">&#x1F441;</span><span class="sb-label">Seguimiento</span></a>
    <a href="/news"      class="sb-link {% if page=='news' %}active{% endif %}"><span class="sb-icon">&#x1F4F0;</span><span class="sb-label">Noticias</span></a>
    <a href="/backtest"  class="sb-link {% if page=='backtest' %}active{% endif %}"><span class="sb-icon">&#x1F52C;</span><span class="sb-label">Simulaci&oacute;n</span></a>
    <a href="/config"    class="sb-link {% if page=='config' %}active{% endif %}"><span class="sb-icon">&#x2699;&#xFE0F;</span><span class="sb-label">Config</span></a>
    <a href="/logs"      class="sb-link {% if page=='logs' %}active{% endif %}"><span class="sb-icon">&#x1F4CB;</span><span class="sb-label">Registros</span></a>
  </div>

  <div class="sb-pulse" id="sb-pulse" title="Estado del bot"></div>

  <div class="sb-themes">
    <div class="tdot" data-theme="dark"      style="background:#07080d;border-color:#b8ff57" title="Dark"></div>
    <div class="tdot" data-theme="light"     style="background:#eef0f7;border-color:#3d7c00" title="Light"></div>
    <div class="tdot" data-theme="bloomberg" style="background:#000;border-color:#ff8c00"    title="Bloomberg"></div>
  </div>
</nav>

<main class="main" id="app">{% block content %}{% endblock %}</main>

<script>
async function api(url, opts) {
  try { const r = await fetch(url,opts); return r.ok?r.json():{} } catch { return {} }
}
const MKT = {forex:'📈',stocks:'💹',polymarket:'🎲',crypto:'₿'};
const LE = {technical:'📊',onchain:'⛓️',on_chain:'⛓️',sentiment:'💬',orderbook:'📋',order_book:'📋',fundamental:'🏢',macro:'🌍',cross_asset:'🔗',crossasset:'🔗',ict:'📐',ict_smc:'📐'};
function layerLabel(n){const k=(n||'').toLowerCase().replace(/[^a-z_]/g,'');return(LE[k]||'🔹')+' '+n;}

function fmtUSD(v,d=2){return '$'+Math.abs(v).toFixed(d);}
function fmtPnl(v){const s=v>=0?'+':'-';return s+fmtUSD(v);}
function pnlCls(v){return v>0?'up':v<0?'dn':'faint';}
function confTag(c){
  const cls=c>=70?'tag-up':c>=50?'tag-wait':'tag-dn';
  const lbl=c>=70?'Alta':c>=50?'Media':'Baja';
  return '<span class="tag '+cls+' mono">'+c+'% '+lbl+'</span>';
}
function timeAgo(iso){
  if(!iso)return'—';
  const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';
}
const SLBL={LONG:'▲ Largo',SHORT:'▼ Corto',WAIT:'— Esperar'};
function sigTag(d){
  const cls=d==='LONG'?'tag-up':d==='SHORT'?'tag-dn':'tag-wait';
  return '<span class="tag '+cls+'">'+(SLBL[d]||d)+'</span>';
}

(function(){
  const t=localStorage.getItem('mai-theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.querySelectorAll('.tdot').forEach(d=>d.classList.toggle('active',d.dataset.theme===t));
})();
document.querySelectorAll('.tdot').forEach(d=>{
  d.addEventListener('click',()=>{
    const t=d.dataset.theme;
    document.documentElement.setAttribute('data-theme',t);
    localStorage.setItem('mai-theme',t);
    document.querySelectorAll('.tdot').forEach(x=>x.classList.toggle('active',x.dataset.theme===t));
  });
});

document.getElementById('mob-btn').onclick=function(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mob-ov').classList.toggle('open');
};
document.getElementById('mob-ov').onclick=function(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-ov').classList.remove('open');
};
document.querySelectorAll('.sb-link').forEach(function(a){a.addEventListener('click',function(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-ov').classList.remove('open');
})});

async function pollStatus(){
  var s=await api('/api/status');
  var el=document.getElementById('sb-pulse');
  if(el)el.className='sb-pulse'+(s&&s.running?' on':'');
}
pollStatus(); setInterval(pollStatus,12000);

function drawLineChart(containerId, data, labels, opts) {
  opts=opts||{}; var el=document.getElementById(containerId);
  if(!el)return;
  if(!data.length){el.innerHTML='<div class="empty"><div class="empty-icon">📉</div><div class="empty-title">Sin datos</div></div>';return;}
  var W=el.clientWidth-28||720,H=opts.h||200;
  var pad={t:18,r:18,b:26,l:56},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  var minV=Math.min.apply(null,data)*.997,maxV=Math.max.apply(null,data)*1.003;
  function xOf(i){return pad.l+i/(data.length-1||1)*cW;}
  function yOf(v){return pad.t+(maxV-v)/(maxV-minV||1)*cH;}
  var xs=data.map(function(_,i){return xOf(i)});
  var ys=data.map(function(v){return yOf(v)});
  var col=data[data.length-1]>=data[0]?'var(--lime)':'var(--rose)';
  var lp=xs.map(function(x,i){return(i===0?'M':'L')+x.toFixed(1)+','+ys[i].toFixed(1)}).join(' ');
  var ap=lp+' L'+xs[xs.length-1].toFixed(1)+','+(pad.t+cH)+' L'+xs[0].toFixed(1)+','+(pad.t+cH)+' Z';
  var yT=[minV,(minV+maxV)/2,maxV].map(function(v){
    return '<line x1="'+pad.l+'" y1="'+yOf(v).toFixed(1)+'" x2="'+(pad.l+cW)+'" y2="'+yOf(v).toFixed(1)+'" stroke="var(--l1)" stroke-dasharray="3,4" stroke-width="1"/>'+
      '<text x="'+(pad.l-7)+'" y="'+(yOf(v)+4).toFixed(1)+'" text-anchor="end" font-size="10" fill="var(--t3)" font-family="Space Grotesk">$'+(v/1000).toFixed(1)+'K</text>';
  }).join('');
  var xI=[0,Math.floor(data.length/2),data.length-1];
  var xT=xI.map(function(i){return'<text x="'+xs[i].toFixed(1)+'" y="'+(H-4)+'" text-anchor="middle" font-size="10" fill="var(--t3)" font-family="Space Grotesk">'+((labels[i]||'').slice(5,16))+'</text>';}).join('');
  var tipId='ct'+Date.now(),hzId='hz'+Date.now(),hcId='hc'+Date.now();
  el.innerHTML='<div class="ctip" id="'+tipId+'"></div>'+
    '<svg width="'+W+'" height="'+H+'" style="display:block;overflow:visible">'+
    '<defs><linearGradient id="fid" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity=".15"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs>'+
    yT+'<path d="'+ap+'" fill="url(#fid)"/><path d="'+lp+'" fill="none" stroke="'+col+'" stroke-width="2"/>'+
    '<circle cx="'+xs[xs.length-1].toFixed(1)+'" cy="'+ys[ys.length-1].toFixed(1)+'" r="4" fill="'+col+'" stroke="var(--s1)" stroke-width="2"/>'+
    xT+'<rect id="'+hzId+'" x="'+pad.l+'" y="'+pad.t+'" width="'+cW+'" height="'+cH+'" fill="transparent" style="cursor:crosshair"/>'+
    '<line id="'+hcId+'" x1="0" y1="'+pad.t+'" x2="0" y2="'+(pad.t+cH)+'" stroke="var(--t3)" stroke-width="1" stroke-dasharray="4,3" style="display:none"/></svg>';
  el.style.position='relative';
  var tip=document.getElementById(tipId);
  document.getElementById(hzId).addEventListener('mousemove',function(e){
    var rect=e.target.getBoundingClientRect();
    var idx=Math.max(0,Math.min(data.length-1,Math.round((e.clientX-rect.left)/cW*(data.length-1))));
    document.getElementById(hcId).setAttribute('x1',xs[idx].toFixed(1));
    document.getElementById(hcId).setAttribute('x2',xs[idx].toFixed(1));
    document.getElementById(hcId).style.display='';
    var chg=((data[idx]-data[0])/data[0]*100).toFixed(2);
    tip.innerHTML='<strong>'+fmtUSD(data[idx])+'</strong> <span class="'+(chg>=0?'up':'dn')+'">'+(chg>=0?'+':'')+chg+'%</span><br><span class="faint">'+(labels[idx]||'').slice(0,16).replace('T',' ')+'</span>';
    tip.style.display='block';
    tip.style.left=(xs[idx]+145>W?xs[idx]-155:xs[idx]+12)+'px';
    tip.style.top=(ys[idx]-10)+'px';
  });
  document.getElementById(hzId).addEventListener('mouseleave',function(){document.getElementById(hcId).style.display='none';tip.style.display='none';});
  if(opts.markers&&opts.markers.length){
    opts.markers.forEach(function(m){
      var t=new Date(m.ts).getTime(),ci=0,md=Infinity;
      labels.forEach(function(l,i){var d=Math.abs(new Date(l).getTime()-t);if(d<md){md=d;ci=i;}});
      if(md>86400000*3)return;
      if(m.dir==='LONG'){var svg=el.querySelector('svg');var txt=document.createElementNS('http://www.w3.org/2000/svg','text');txt.setAttribute('x',xs[ci].toFixed(1));txt.setAttribute('y',(ys[ci]-9).toFixed(1));txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','10');txt.setAttribute('fill','var(--lime)');txt.textContent='▲';svg.appendChild(txt);}
    });
  }
}
</script>
{% block scripts %}{% endblock %}
</body></html>
