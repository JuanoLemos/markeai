{% extends "base.html" %}
{% block content %}
<h1>👁 Watchlist</h1>
<div class="filter-bar" id="wl-filters">
  <span class="chip active" data-mkt="all">Todos</span>
  <span class="chip" data-mkt="forex">📈 Forex</span>
  <span class="chip" data-mkt="stocks">💹 Stocks</span>
  <span class="chip" data-mkt="polymarket">🎲 Polymarket</span>
</div>

<div id="wl-loading" style="text-align:center;padding:40px;color:var(--text-muted)">Cargando...</div>
<div id="wl-content" style="display:none">
  <table id="wl-table">
    <tr>
      <th>Ticker</th><th>Mercado</th><th>Señales</th>
      <th>L / S</th><th>Conf%</th><th>Trades</th>
      <th>Abiertas</th><th>Win Rate</th><th>PnL</th><th>Última señal</th>
    </tr>
  </table>
</div>
<div id="wl-empty" style="display:none"><div class="empty-state">Sin datos — ejecuta el loop para generar señales y trades</div></div>
{% endblock %}

{% block scripts %}
<script>
const EMOJI = { forex: '📈', stocks: '💹', polymarket: '🎲' };
let allData = [];

document.querySelectorAll('#wl-filters .chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('#wl-filters .chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    renderTable(c.dataset.mkt);
  });
});

function renderTable(mkt) {
  const rows = mkt === 'all' ? allData : allData.filter(r => r.market === mkt);
  const tbl = document.getElementById('wl-table');
  if (!rows.length) {
    document.getElementById('wl-content').style.display = 'none';
    document.getElementById('wl-empty').style.display = 'block';
    return;
  }
  document.getElementById('wl-empty').style.display = 'none';
  document.getElementById('wl-content').style.display = 'block';
  tbl.innerHTML = `<tr><th>Ticker</th><th>Mercado</th><th>Señales</th><th>L / S</th><th>Conf%</th><th>Trades</th><th>Abiertas</th><th>Win Rate</th><th>PnL</th><th>Última señal</th></tr>` +
    rows.map(r => {
      const wr = r.win_rate !== null ? (r.win_rate >= 55 ? `<span class="green">${r.win_rate}%</span>` : r.win_rate < 45 ? `<span class="red">${r.win_rate}%</span>` : `${r.win_rate}%`) : '—';
      const pnl = `<span class="${r.total_pnl >= 0 ? 'green' : 'red'}">${r.total_pnl >= 0 ? '+' : ''}$${r.total_pnl}</span>`;
      const ls = `<span class="signal-LONG">${r.longs}</span> / <span class="signal-SHORT">${r.shorts}</span>`;
      const last = r.last_signal ? r.last_signal.slice(5, 16) : '—';
      const open = r.open_count > 0 ? `<span class="signal-LONG">${r.open_count}</span>` : '0';
      return `<tr>
        <td><strong><a href="/ticker/${r.ticker}">${r.ticker}</a></strong></td>
        <td><span class="market-tag">${EMOJI[r.market] || ''}</span> ${r.market}</td>
        <td>${r.total_signals}</td>
        <td>${ls}</td>
        <td>${r.avg_conf}%</td>
        <td>${r.trades}</td>
        <td>${open}</td>
        <td>${wr}</td>
        <td>${pnl}</td>
        <td class="text-muted" style="font-size:12px">${last}</td>
      </tr>`;
    }).join('');
}

(async function() {
  allData = await api('/api/watchlist');
  document.getElementById('wl-loading').style.display = 'none';
  renderTable('all');
})();
</script>
{% endblock %}
