{% extends "base.html" %}
{% block content %}
<h1>Configuración</h1>
<form id="config-form">
  <div class="config-section">
    <h3>Mercados</h3>
    <div id="markets"></div>
  </div>
  <div class="config-section">
    <h3>Riesgo</h3>
    <div class="form-row" id="risk"></div>
  </div>
  <div class="config-section">
    <h3>DeepSeek</h3>
    <div class="form-row" id="deepseek"></div>
  </div>
  <button class="btn btn-primary" type="submit">Guardar cambios</button>
  <span id="save-msg" class="text-muted ml-2"></span>
</form>
{% endblock %}

{% block scripts %}
<script>
async function loadConfig() {
  const c = await api('/api/config');
  const mkt = document.getElementById('markets');
  mkt.innerHTML = Object.entries(c.markets).map(([k,v]) => `
    <div style="margin-bottom:12px;padding:12px;background:var(--bg-primary);border-radius:6px">
      <strong style="color:var(--accent-green)">${k}</strong>
      <div class="form-row" style="margin-top:8px">
        <div class="form-group"><label>Enabled</label><select name="markets.${k}.enabled">${['true','false'].map(o => `<option ${v.enabled==(o==='true')?'selected':''}>${o}</option>`).join('')}</select></div>
        <div class="form-group"><label>Interval (min)</label><input name="markets.${k}.check_interval_min" value="${v.check_interval_min}" type="number" min="5"></div>
        <div class="form-group"><label>Max Position USD</label><input name="markets.${k}.max_position_usd" value="${v.max_position_usd}" type="number" min="1"></div>
        <div class="form-group"><label>Min Confidence</label><input name="markets.${k}.min_confidence" value="${v.min_confidence}" type="number" min="0" max="100"></div>
      </div>
    </div>`).join('');
  const r = document.getElementById('risk');
  r.innerHTML = Object.entries({max_position_pct:c.risk.max_position_pct, max_daily_loss_pct:c.risk.max_daily_loss_pct}).map(([k,v]) =>
    `<div class="form-group"><label>${k}</label><input name="risk.${k}" value="${v}" step="0.01" type="number"></div>`
  ).join('');
  const d = document.getElementById('deepseek');
  d.innerHTML = `<div class="form-group"><label>Model</label><input name="deepseek.model" value="${c.deepseek.model}"></div>
    <div class="form-group"><label>Temperature</label><input name="deepseek.temperature" value="${c.deepseek.temperature}" step="0.1" type="number"></div>
    <div class="form-group"><label>Max Tokens</label><input name="deepseek.max_tokens" value="${c.deepseek.max_tokens}" type="number"></div>`;
}

document.getElementById('config-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = {};
  for (const [k, v] of fd) {
    const parts = k.split('.');
    let o = data;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!o[parts[i]]) o[parts[i]] = {};
      o = o[parts[i]];
    }
    o[parts[parts.length - 1]] = v;
  }
  const r = await fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
  const res = await r.json();
  document.getElementById('save-msg').textContent = res.ok ? '✓ Guardado' : '✗ Error: ' + (res.error||'');
});

loadConfig();
</script>
{% endblock %}
