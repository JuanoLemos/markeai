{% extends "base.html" %}
{% block content %}
<h1>Configuración</h1>
<form id="config-form">
  <div class="config-section">
    <h3 onclick="this.parentElement.classList.toggle('collapsed')">Mercados</h3>
    <div class="config-body"><div id="markets"></div></div>
  </div>
  <div class="config-section">
    <h3 onclick="this.parentElement.classList.toggle('collapsed')">Riesgo</h3>
    <div class="config-body"><div class="form-row" id="risk"></div></div>
  </div>
  <div class="config-section">
    <h3 onclick="this.parentElement.classList.toggle('collapsed')">DeepSeek</h3>
    <div class="config-body"><div class="form-row" id="deepseek"></div></div>
  </div>
  <div class="config-section collapsed">
    <h3 onclick="this.parentElement.classList.toggle('collapsed')">Capas</h3>
    <div class="config-body"><div id="layers"></div></div>
  </div>
  <button class="btn btn-primary" type="submit" style="margin-top:16px">Guardar cambios</button>
  <span id="save-msg" class="text-muted ml-2"></span>
</form>
{% endblock %}

{% block scripts %}
<script>
let currentConfig = null;

function renderMarketBlock(name, v) {
  const tickers = v.tickers || v.pairs || null;
  const tickersField = tickers ? `
    <div class="form-group" style="grid-column:1/-1">
      <label>${v.tickers ? 'Tickers' : 'Pares'} (separar por coma)</label>
      <input name="markets.${name}.${v.tickers ? 'tickers' : 'pairs'}" value="${tickers.join(', ')}" data-array="true">
    </div>` : '';
  return `
    <div style="margin-bottom:12px;padding:12px;background:var(--bg-primary);border-radius:6px">
      <strong style="color:var(--accent-green)">${name}</strong>
      <div class="form-row" style="margin-top:8px">
        <div class="form-group"><label>Enabled</label><select name="markets.${name}.enabled">${['true','false'].map(o => `<option ${v.enabled==(o==='true')?'selected':''}>${o}</option>`).join('')}</select></div>
        <div class="form-group"><label>Mode</label><select name="markets.${name}.mode">${['paper','real'].map(o => `<option ${v.mode===o?'selected':''}>${o}</option>`).join('')}</select></div>
        <div class="form-group"><label>Interval (min)</label><input name="markets.${name}.check_interval_min" value="${v.check_interval_min}" type="number" min="5"></div>
        <div class="form-group"><label>Max Position USD</label><input name="markets.${name}.max_position_usd" value="${v.max_position_usd}" type="number" min="1"></div>
        <div class="form-group"><label>Min Confidence</label><input name="markets.${name}.min_confidence" value="${v.min_confidence}" type="number" min="0" max="100"></div>
        ${v.max_positions_concurrent != null ? `<div class="form-group"><label>Max Concurrent</label><input name="markets.${name}.max_positions_concurrent" value="${v.max_positions_concurrent}" type="number" min="1"></div>` : ''}
        ${tickersField}
      </div>
    </div>`;
}

async function loadConfig() {
  const c = await api('/api/config');
  currentConfig = c;
  document.getElementById('markets').innerHTML = Object.entries(c.markets).map(([k,v]) => renderMarketBlock(k, v)).join('');
  const r = document.getElementById('risk');
  r.innerHTML = Object.entries(c.risk).map(([k,v]) =>
    `<div class="form-group"><label>${k}</label><input name="risk.${k}" value="${v}" step="0.01" type="number"></div>`
  ).join('');
  const d = document.getElementById('deepseek');
  d.innerHTML = `<div class="form-group"><label>Model</label><input name="deepseek.model" value="${c.deepseek.model}"></div>
    <div class="form-group"><label>Temperature</label><input name="deepseek.temperature" value="${c.deepseek.temperature}" step="0.1" type="number"></div>
    <div class="form-group"><label>Max Tokens</label><input name="deepseek.max_tokens" value="${c.deepseek.max_tokens}" type="number"></div>
    <div class="form-group"><label>Timeout (s)</label><input name="deepseek.timeout_seconds" value="${c.deepseek.timeout_seconds||30}" type="number"></div>`;
  const l = document.getElementById('layers');
  const layers = c.layers || {};
  l.innerHTML = Object.entries(layers).map(([name, cfg]) => `
    <div style="margin-bottom:10px;padding:8px 12px;background:var(--bg-primary);border-radius:6px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <strong style="min-width:100px">${name}</strong>
      <label style="font-size:12px;display:flex;align-items:center;gap:4px"><input type="checkbox" name="layers.${name}.enabled" ${cfg.enabled ? 'checked' : ''} onchange="this.previousElementSibling.value=this.checked"> Enabled</label>
      ${['polymarket','forex','stocks'].map(m => `<div class="form-group" style="margin:0"><label style="font-size:10px">${m[0].toUpperCase()}</label><input name="layers.${name}.weight_${m}" value="${cfg['weight_'+m]||0}" step="0.01" type="number" style="width:55px;padding:4px 6px;font-size:12px"></div>`).join('')}
    </div>`).join('');
}

document.getElementById('config-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = {};
  document.querySelectorAll('#config-form [name]').forEach(el => {
    const k = el.name;
    let v = el.value;
    if (el.dataset.array === 'true') {
      v = v.split(',').map(s => s.trim()).filter(Boolean);
    } else if (el.type === 'checkbox') {
      v = el.checked ? true : false;
    }
    const parts = k.split('.');
    let o = data;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!o[parts[i]]) o[parts[i]] = {};
      o = o[parts[i]];
    }
    o[parts[parts.length - 1]] = v;
  });
  const msg = document.getElementById('save-msg');
  msg.textContent = 'Guardando…';
  const r = await fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
  const res = await r.json();
  msg.textContent = res.ok ? '✓ Guardado correctamente' : '✗ Error: ' + (res.error||'');
  msg.style.color = res.ok ? 'var(--accent-green)' : 'var(--accent-red)';
  setTimeout(() => { msg.textContent = ''; msg.style.color = ''; }, 4000);
});

loadConfig();
</script>
{% endblock %}
