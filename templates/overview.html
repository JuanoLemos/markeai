{% extends "base.html" %}
{% block title %}Inicio{% endblock %}
{% block content %}

<div class="status-strip mb-3">
  <div class="flex gap-2">
    <span class="sb-pulse" id="page-pulse"></span>
    <span class="faint" id="page-status-txt">Verificando&hellip;</span>
  </div>
  <div class="sep"></div>
  <button class="btn btn-lime btn-sm" onclick="doLoop(true)"  id="btn-start">&#9654; Activar bot</button>
  <button class="btn btn-rose  btn-sm" onclick="doLoop(false)" id="btn-stop" >&#9632; Pausar bot</button>
</div>

<div id="brief-box" class="mb-2"></div>

<div class="grid-overview">
  <div class="area-chart cell">
    <div class="cell-header">
      <div class="cell-title">&#x1F4C9; Curva de capital</div>
      <div class="btn-group">
        <span class="chip" onclick="setP('1d',this)">1d</span>
        <span class="chip" onclick="setP('7d',this)">7d</span>
        <span class="chip" onclick="setP('30d',this)">30d</span>
        <span class="chip on" onclick="setP('all',this)">Todo</span>
        <span class="mono" id="eq-chg" style="font-size:14px;font-weight:700;margin-left:4px"></span>
      </div>
    </div>
    <div class="cell-body" style="min-height:240px;position:relative" id="eq-ctnr">
      <div class="ctip" id="eq-tip"></div>
      <div id="eq-inner" class="loading"><div class="spin"></div></div>
    </div>
  </div>

  <div class="area-metrics cell">
    <div class="cell-header">
      <div class="cell-title">&#x1F4CA; Resumen</div>
    </div>
    <div class="cell-body-0">
      <div class="kpi-row" id="hero-kpis"></div>
    </div>
  </div>

  <div class="area-signals cell">
    <div class="cell-header">
      <div class="cell-title">&#x26A1; &Uacute;ltimas se&ntilde;ales</div>
    </div>
    <div class="cell-body-0">
      <table id="sig-table"><tr><td class="loading"><div class="spin"></div></td></tr></table>
    </div>
  </div>

  <div class="area-pos cell">
    <div class="cell-header">
      <div class="cell-title">&#x1F4BC; Posiciones abiertas</div>
    </div>
    <div class="cell-body-0">
      <table id="pos-table"><tr><td class="loading"><div class="spin"></div></td></tr></table>
    </div>
  </div>

  <div class="area-market cell">
    <div class="cell-header">
      <div class="cell-title">&#x1F4CA; Normal vs Fast</div>
    </div>
    <div class="cell-body" id="profiles-grid"></div>
  </div>

  <div class="area-health cell">
    <div class="cell-header">
      <div class="cell-title">&#x1F4BC; M&eacute;tricas</div>
    </div>
    <div class="cell-body-0 kpi-row" id="ext-kpis"></div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
/* ── Helpers for this page ── */
async function doLoop(start) {
  await api(start?'/api/loop/start':'/api/loop/stop');
  await loadStatus();
}

function profileCard(title, d) {
  const cls = function(v){return v>=0?'up':'dn';};
  const sgn = function(v){return v>=0?'+':'-';};
  return '<div class="cell" style="background:var(--s2)"><div class="cell-header"><div class="cell-title">'+title+'</div></div><div class="cell-body"><div class="grid-2">'+
    '<div class="kpi-block"><div class="kpi-num '+cls(d.balance-1000)+'">'+fmtUSD(Math.abs(d.balance-1000))+'</div><div class="kpi-label">PnL</div><div class="kpi-sub">'+sgn(d.balance-1000)+((d.balance-1000)/1000*100).toFixed(1)+'%</div></div>'+
    '<div class="kpi-block"><div class="kpi-num info" style="font-size:28px">'+fmtUSD(d.balance)+'</div><div class="kpi-label">Balance</div><div class="kpi-sub">'+d.open_positions+' abiertas</div></div>'+
    '<div class="kpi-block"><div class="kpi-num '+(d.win_rate>=50?'up':'dn')+'" style="font-size:24px">'+d.win_rate+'%</div><div class="kpi-label">Win Rate</div><div class="kpi-sub">'+d.winning_trades+'/'+d.total_trades+'</div></div>'+
    '<div class="kpi-block"><div class="kpi-num faint" style="font-size:24px">$'+d.exposure_usd.toFixed(0)+'</div><div class="kpi-label">Expuesto</div></div></div></div></div>';
}

/* ── Load data ── */
async function loadMetrics() {
  const s = await api('/api/summary');
  const cards = [];
  if(s.normal) cards.push(profileCard('Normal &#x1F7E2;', s.normal));
  if(s.fast)   cards.push(profileCard('Fast &#x1F535;', s.fast));
  document.getElementById('profiles-grid').innerHTML = cards.join('');

  const ext = await api('/api/metrics/extended')||{};
  const mEl = document.getElementById('ext-kpis');
  if(ext.sharpe_ratio!=null){
    const sc = ext.sharpe_ratio>=1?'up':'dn';
    const pc = ext.profit_factor>=1.5?'up':'dn';
    const mc = ext.max_drawdown_pct>-10?'up':'dn';
    mEl.innerHTML =
      '<div class="kpi-cell"><div class="kpi-block" style="gap:0"><div class="kpi-num '+sc+'" style="font-size:20px">'+ext.sharpe_ratio.toFixed(2)+'</div><div class="kpi-label">Sharpe</div></div></div>'+
      '<div class="kpi-cell"><div class="kpi-block" style="gap:0"><div class="kpi-num '+pc+'" style="font-size:20px">'+ext.profit_factor.toFixed(2)+'</div><div class="kpi-label">Profit Factor</div></div></div>'+
      '<div class="kpi-cell"><div class="kpi-block" style="gap:0"><div class="kpi-num '+mc+'" style="font-size:20px">'+(ext.avg_loss||0).toFixed(2)+'</div><div class="kpi-label">Avg Loss</div></div></div>'+
      '<div class="kpi-cell"><div class="kpi-block" style="gap:0"><div class="kpi-num info" style="font-size:20px">'+(ext.avg_win||0).toFixed(2)+'</div><div class="kpi-label">Avg Win</div></div></div>';
  } else {
    mEl.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📊</div><div class="empty-title">Sin m&eacute;tricas a&uacute;n</div></div>';
  }

  const sig = await api('/api/signals');
  const tEl = document.getElementById('sig-table');
  if(!sig||!sig.length){tEl.innerHTML='<tr><td class="empty" colspan="3"><div class="empty-icon">⚡</div><div class="empty-title">Sin se&ntilde;ales</div></td></tr>';}
  else{tEl.innerHTML='<tr><th>Mercado</th><th>Decisi&oacute;n</th><th>Conf</th></tr>'+
    sig.slice(0,10).map(function(s){
      return '<tr><td>'+(MKT[s.market]||'')+' '+s.market+'</td><td>'+sigTag(s.decision)+'</td><td class="num">'+confTag(s.confidence)+'</td></tr>';
    }).join('');}

  const pos = await api('/api/positions');
  const pEl = document.getElementById('pos-table');
  if(!pos||!pos.length){pEl.innerHTML='<tr><td class="empty" colspan="4"><div class="empty-icon">💼</div><div class="empty-title">Sin posiciones</div></td></tr>';}
  else{pEl.innerHTML='<tr><th>Ticker</th><th>Se&ntilde;al</th><th>Entrada</th><th>SL/TP</th></tr>'+
    pos.map(function(p){
      return '<tr><td class="num">'+p.ticker+'</td><td>'+sigTag(p.signal)+'</td><td class="num">$'+p.entry_price+'</td><td class="num">'+p.stop_loss_pct+'% / '+p.take_profit_pct+'%</td></tr>';
    }).join('');}
}

async function loadStatus() {
  const s = await api('/api/status');
  const d = document.getElementById('page-pulse');
  if(d)d.className='sb-pulse'+(s&&s.running?' on':'');
  document.getElementById('page-status-txt').textContent = s&&s.running?'Bot activo':'Bot detenido';
  document.getElementById('btn-start').disabled = s&&s.running;
  document.getElementById('btn-stop').disabled = !s||!s.running;
}

async function loadFinancials() {
  const s = await api('/api/summary');
  const kpisEl = document.getElementById('hero-kpis');
  if(!kpisEl)return;
  let html='';
  ['normal','fast'].forEach(function(n){
    const d=s[n]||{};
    if(s.active&&s.active.indexOf(n)===-1)return;
    var lbl=n==='normal'?'Normal &#x1F7E2;':'Fast &#x1F535;';
    var bal=d.balance||1000; var pnl=bal-1000;
    html+='<div class="kpi-cell" style="grid-column:span 2"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:4px">'+lbl+'</div>'+
      '<div class="kpi-row" style="gap:1px;background:var(--l1)">'+
      '<div class="kpi-cell"><div class="kpi-block"><div class="kpi-num '+(pnl>=0?'up':'dn')+'">'+fmtUSD(Math.abs(pnl))+'</div><div class="kpi-label">PnL</div></div></div>'+
      '<div class="kpi-cell"><div class="kpi-block"><div class="kpi-num info" style="font-size:22px">'+fmtUSD(bal)+'</div><div class="kpi-label">Balance</div></div></div>'+
      '<div class="kpi-cell"><div class="kpi-block"><div class="kpi-num '+(d.win_rate>=50?'up':'dn')+'" style="font-size:22px">'+d.win_rate+'%</div><div class="kpi-label">Win Rate</div></div></div>'+
      '<div class="kpi-cell"><div class="kpi-block"><div class="kpi-num faint" style="font-size:22px">'+d.total_trades+'</div><div class="kpi-label">Trades</div></div></div></div></div>';
  });
  kpisEl.innerHTML=html;
}

let _eqPeriod='all';
function setP(p,btn){
  _eqPeriod=p;
  document.querySelectorAll('.chip[onclick*="setP"]').forEach(function(c){c.className='chip';});
  if(btn)btn.className='chip on';
  loadEquity();
}

async function loadEquity() {
  const h = await api('/api/portfolio/history');
  const labels=[]; const data=[];
  (h||[]).forEach(function(p){labels.push(p.timestamp);data.push(p.balance_usd);});
  var pct; if(data.length>1) pct='<span class="'+(data[data.length-1]>=data[0]?'up':'dn')+'">'+((data[data.length-1]-data[0])/data[0]*100).toFixed(2)+'%</span>';
  document.getElementById('eq-chg').innerHTML=pct||'';
  drawLineChart('eq-inner', data, labels, {h:220});
}

loadMetrics(); loadStatus(); loadFinancials();
setInterval(function(){loadMetrics();loadStatus();loadFinancials();},15000);
</script>
{% endblock %}
