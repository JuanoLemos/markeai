{% extends "base.html" %}
{% block content %}
<h1>Overview</h1>
<div class="btn-group">
  <button class="btn btn-primary" onclick="toggleLoop(true)" id="btn-start">▶ Iniciar Loop</button>
  <button class="btn btn-danger" onclick="toggleLoop(false)" id="btn-stop">■ Detener</button>
  <span class="flex" id="status-badge"><span class="status-dot stopped"></span><span id="status-text">Verificando...</span></span>
</div>

<div class="cards" id="metrics"></div>

<div class="section">
  <h2>Equity Curve</h2>
  <div id="equity-chart" style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px;min-height:260px;text-align:center;color:var(--text-muted);padding-top:100px;">Cargando...</div>
</div>

<div class="section">
  <h2>Estado de APIs</h2>
  <div class="cards" id="health-cards"></div>
</div>

<div class="section">
  <h2>Posiciones Abiertas</h2>
  <table id="positions-table"><tr><td colspan="5" class="text-muted">Cargando...</td></tr></table>
</div>

<div class="section">
  <h2>Últimas Señales</h2>
  <table id="signals-table"><tr><td colspan="5" class="text-muted">Cargando...</td></tr></table>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadMetrics() {
  const s = await api('/api/summary');
  document.getElementById('metrics').innerHTML = `
    <div class="card"><div class="label">Balance</div><div class="value">$${s.balance.toLocaleString()}</div><div class="sub">Inicial: $${s.initial_balance.toLocaleString()}</div></div>
    <div class="card"><div class="label">P&L Total</div><div class="value ${s.total_pnl >= 0 ? 'green' : 'red'}">${s.total_pnl >= 0 ? '+' : ''}$${s.total_pnl.toFixed(2)}</div><div class="sub ${s.total_pnl_pct >= 0 ? 'green' : 'red'}">${s.total_pnl_pct >= 0 ? '+' : ''}${s.total_pnl_pct.toFixed(1)}%</div></div>
    <div class="card"><div class="label">Daily P&L</div><div class="value ${s.daily_pnl >= 0 ? 'green' : 'red'}">${s.daily_pnl >= 0 ? '+' : ''}$${s.daily_pnl.toFixed(2)}</div></div>
    <div class="card"><div class="label">Open Positions</div><div class="value">${s.open_positions}</div><div class="sub">Exposición: $${s.exposure_usd.toFixed(2)}</div></div>
    <div class="card"><div class="label">Win Rate</div><div class="value">${s.win_rate}%</div><div class="sub">${s.total_trades} trades total</div></div>
    <div class="card"><div class="label">Trade Count</div><div class="value">${s.winning_trades}/${s.total_trades}</div><div class="sub">Wins / Total</div></div>
  `;
}

async function loadEquity() {
  const h = await api('/api/portfolio/history');
  const el = document.getElementById('equity-chart');
  if (!h.length) { el.innerHTML = '<div style="padding:100px 0;color:var(--text-muted)">Sin datos de portfolio aun. Corre el loop para empezar a graficar.</div>'; return; }
  const labels = h.map(p => p.timestamp.slice(5,16));
  const data = h.map(p => p.balance_usd);
  const min = Math.min(...data) * 0.995;
  const max = Math.max(...data) * 1.005;
  const w = el.clientWidth || 800;
  const h2 = 240;
  const pad = {t:20,r:20,b:30,l:50};
  const xs = data.map((_,i) => pad.l + i/(data.length-1)*(w-pad.l-pad.r));
  const ys = data.map(v => pad.t + (max-v)/(max-min)*(h2-pad.t-pad.b));
  const line = xs.map((x,i) => `${i===0?'M':'L'}${x.toFixed(0)},${ys[i].toFixed(0)}`).join(' ');
  const last = data[data.length-1];
  const first = data[0];
  const color = last >= first ? 'var(--accent-green)' : 'var(--accent-red)';
  el.innerHTML = `<svg width="${w}" height="${h2}" style="display:block">
    <text x="${pad.l}" y="${pad.t-4}" fill="var(--text-muted)" font-size="11">$${(max/1000).toFixed(0)}K</text>
    <text x="${pad.l}" y="${h2-pad.b+14}" fill="var(--text-muted)" font-size="11">$${(min/1000).toFixed(0)}K</text>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="2"/>
    <circle cx="${xs[xs.length-1]}" cy="${ys[ys.length-1]}" r="3" fill="${color}"/>
  </svg>`;
}

async function loadHealth() {
  const h = await api('/api/health');
  document.getElementById('health-cards').innerHTML = Object.entries(h).map(([k,v]) =>
    `<div class="card" style="text-align:center"><div class="label">${k}</div><div style="font-size:28px;margin-top:4px">${v ? '🟢' : '🔴'}</div></div>`
  ).join('');
}

async function loadPositions() {
  const pos = await api('/api/positions');
  const t = document.getElementById('positions-table');
  if (!pos.length) { t.innerHTML = '<tr><td colspan="5" class="text-muted">Sin posiciones abiertas</td></tr>'; return; }
  t.innerHTML = `<tr><th>Ticker</th><th>Señal</th><th>Entrada</th><th>Tamaño</th><th>SL / TP</th></tr>` +
    pos.map(p => `<tr><td>${p.ticker}</td><td class="signal-${p.signal}">${p.signal}</td><td>$${p.entry_price}</td><td>$${p.size_usd}</td><td>${p.stop_loss_pct}% / ${p.take_profit_pct}%</td></tr>`).join('');
}

async function loadSignals() {
  const sig = await api('/api/signals');
  const t = document.getElementById('signals-table');
  if (!sig.length) { t.innerHTML = '<tr><td colspan="5" class="text-muted">Sin señales generadas</td></tr>'; return; }
  t.innerHTML = `<tr><th>Hora</th><th>Mercado</th><th>Ticker</th><th>Decisión</th><th>Confianza</th></tr>` +
    sig.slice(0,10).map(s => `<tr><td>${s.timestamp.slice(11,19)}</td><td>${s.market}</td><td>${s.ticker}</td><td class="signal-${s.decision}">${s.decision}</td><td>${s.confidence}</td></tr>`).join('');
}

async function toggleLoop(start) {
  await api(start ? '/api/loop/start' : '/api/loop/stop');
  loadStatus();
}

async function loadStatus() {
  const st = await api('/api/status');
  const dot = document.getElementById('status-badge').querySelector('.status-dot');
  dot.className = 'status-dot ' + (st.running ? 'running' : 'stopped');
  document.getElementById('status-text').textContent = st.running ? 'Corriendo' : 'Detenido';
  document.getElementById('btn-start').disabled = st.running;
  document.getElementById('btn-stop').disabled = !st.running;
}

loadMetrics(); loadEquity(); loadHealth(); loadPositions(); loadSignals(); loadStatus();
setInterval(() => { loadMetrics(); loadEquity(); loadHealth(); loadPositions(); loadSignals(); }, 10000);
</script>
{% endblock %}
