{% extends "base.html" %}
{% block content %}
<div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
  <a href="/watchlist" style="color:var(--text-muted);font-size:13px;text-decoration:none">← Watchlist</a>
</div>
<h1 id="ticker-title">{{ symbol }}</h1>

<div class="cards" id="ticker-summary" style="margin-bottom:20px"></div>

<div class="section">
  <h2>Precio <span class="text-muted" style="font-size:12px;font-weight:400">— market_data</span></h2>
  <div id="ticker-chart" style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px;min-height:200px;position:relative">
    <div id="ticker-chart-inner" style="text-align:center;color:var(--text-muted);padding-top:80px">Cargando...</div>
    <div id="ticker-tooltip" style="display:none;position:absolute;background:var(--bg-hover);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--text);pointer-events:none;z-index:10;white-space:nowrap"></div>
  </div>
</div>

<div class="section">
  <h2>Señales recientes</h2>
  <table id="ticker-signals-table"><tr><td colspan="5"><div class="empty-state">Cargando...</div></td></tr></table>
</div>

<div class="section">
  <h2>Trades</h2>
  <div class="cards" id="ticker-trade-summary" style="margin-bottom:12px"></div>
  <table id="ticker-trades-table"><tr><td colspan="6"><div class="empty-state">Cargando...</div></td></tr></table>
</div>
{% endblock %}

{% block scripts %}
<script>
const SYMBOL = {{ symbol | tojson }};
const MARKET_EMOJI = { forex: '📈', stocks: '💹', polymarket: '🎲', crypto: '₿' };

async function loadTicker() {
  const d = await api('/api/ticker/' + encodeURIComponent(SYMBOL));

  // summary cards
  const trades = d.trades || [];
  const closed = trades.filter(t => t.status === 'closed' || t.exit_time);
  const wins = closed.filter(t => (t.pnl_usd || 0) > 0);
  const totalPnl = closed.reduce((s, t) => s + (t.pnl_usd || 0), 0);
  const wr = closed.length ? (wins.length / closed.length * 100).toFixed(1) : '—';
  const mkt = (d.signals[0] || {}).market || '';
  document.getElementById('ticker-title').textContent = (MARKET_EMOJI[mkt] || '') + ' ' + SYMBOL;
  document.getElementById('ticker-summary').innerHTML = `
    <div class="card"><div class="label">Señales</div><div class="value">${d.signals.length}</div></div>
    <div class="card"><div class="label">Trades</div><div class="value">${closed.length}</div><div class="sub">${trades.filter(t=>!t.exit_time).length} abiertos</div></div>
    <div class="card"><div class="label">Win Rate</div><div class="value ${wins.length/closed.length>=0.5?'green':'red'}">${wr}%</div></div>
    <div class="card"><div class="label">PnL Total</div><div class="value ${totalPnl>=0?'green':'red'}">${totalPnl>=0?'+':''}$${totalPnl.toFixed(2)}</div></div>
  `;

  // price chart
  const ph = d.price_history || [];
  renderPriceChart(ph, d.signals, d.trades);

  // signals table
  const st = document.getElementById('ticker-signals-table');
  if (!d.signals.length) {
    st.innerHTML = '<tr><td colspan="5"><div class="empty-state">Sin señales para este ticker</div></td></tr>';
  } else {
    st.innerHTML = `<tr><th>Hora</th><th>Decisión</th><th>Confianza</th><th>Top Layer</th><th>Razonamiento</th></tr>` +
      d.signals.map(s => {
        const layers = s.layer_scores || {};
        const top = Object.entries(layers).sort((a,b)=>Math.abs(b[1].score||b[1]||0)-Math.abs(a[1].score||a[1]||0))[0];
        const topLabel = top ? `${layerLabel(top[0])}: ${typeof top[1]==='object'?(top[1].score||'—'):top[1]}` : '—';
        const reasoning = (s.reasoning || '').slice(0, 80) + ((s.reasoning||'').length > 80 ? '…' : '');
        return `<tr>
          <td>${(s.timestamp||'').slice(0,16).replace('T',' ')}</td>
          <td class="signal-${s.decision}">${s.decision==='LONG'?'▲':s.decision==='SHORT'?'▼':'⏸'} ${s.decision}</td>
          <td>${s.confidence}%</td>
          <td style="font-size:11px;color:var(--text-muted)">${topLabel}</td>
          <td style="font-size:11px;color:var(--text-muted);max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${(s.reasoning||'').replace(/"/g,"'")}">${reasoning}</td>
        </tr>`;
      }).join('');
  }

  // trades
  const tt = document.getElementById('ticker-trades-table');
  if (!trades.length) {
    tt.innerHTML = '<tr><td colspan="6"><div class="empty-state">Sin trades para este ticker</div></td></tr>';
  } else {
    tt.innerHTML = `<tr><th>Entrada</th><th>Dir</th><th>Precio entrada</th><th>Precio salida</th><th>PnL</th><th>Estado</th></tr>` +
      trades.map(t => {
        const pnl = t.pnl_usd || 0;
        const status = t.exit_time ? (pnl > 0 ? 'WIN' : 'LOSS') : 'OPEN';
        const statusClass = status === 'WIN' ? 'green' : status === 'LOSS' ? 'red' : '';
        return `<tr>
          <td>${(t.entry_time||'').slice(0,16).replace('T',' ')}</td>
          <td class="signal-${t.signal}">${t.signal==='LONG'?'▲':'▼'} ${t.signal}</td>
          <td>$${(t.entry_price||0).toFixed(4)}</td>
          <td>${t.exit_price ? '$'+t.exit_price.toFixed(4) : '—'}</td>
          <td class="${pnl>=0?'green':'red'}">${t.exit_time?(pnl>=0?'+':'')+'$'+pnl.toFixed(2):'—'}</td>
          <td class="${statusClass}">${status}</td>
        </tr>`;
      }).join('');
  }
}

function renderPriceChart(ph, signals, trades) {
  const inner = document.getElementById('ticker-chart-inner');
  const tooltip = document.getElementById('ticker-tooltip');
  if (!ph.length) {
    inner.innerHTML = '<div style="padding:60px 0;color:var(--text-muted)">Sin datos de precio para este ticker aún.</div>';
    return;
  }
  const container = document.getElementById('ticker-chart');
  const W = container.clientWidth - 24 || 780;
  const H = 200;
  const pad = {t:20,r:20,b:28,l:58};
  const cW = W - pad.l - pad.r, cH = H - pad.t - pad.b;

  const prices = ph.map(p => p.price);
  const labels = ph.map(p => p.timestamp);
  const minP = Math.min(...prices) * 0.998;
  const maxP = Math.max(...prices) * 1.002;
  const xOf = i => pad.l + i / Math.max(1, prices.length - 1) * cW;
  const yOf = v => pad.t + (maxP - v) / (maxP - minP || 1) * cH;

  const xs = prices.map((_,i) => xOf(i));
  const ys = prices.map(v => yOf(v));
  const first = prices[0], last = prices[prices.length-1];
  const color = last >= first ? 'var(--accent-green)' : 'var(--accent-red)';
  const fillId = 'tf-' + Date.now();

  const linePath = xs.map((x,i) => `${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  const areaPath = linePath + ` L${xs[xs.length-1].toFixed(1)},${(pad.t+cH)} L${xs[0].toFixed(1)},${(pad.t+cH)} Z`;

  // signal markers on price chart
  const sigMarkers = (signals||[]).map(s => {
    const ts = new Date(s.timestamp).getTime();
    let closest = 0, minDiff = Infinity;
    ph.forEach((p, i) => {
      const diff = Math.abs(new Date(p.timestamp).getTime() - ts);
      if (diff < minDiff) { minDiff = diff; closest = i; }
    });
    if (minDiff > 86400000 * 3) return '';
    const sc = s.decision === 'LONG' ? 'var(--accent-green)' : s.decision === 'SHORT' ? 'var(--accent-red)' : 'var(--accent-wait)';
    const sym = s.decision === 'LONG' ? '▲' : s.decision === 'SHORT' ? '▼' : '⏸';
    return `<text x="${xs[closest].toFixed(1)}" y="${(ys[closest]-8).toFixed(1)}" text-anchor="middle" font-size="9" fill="${sc}">${sym}</text>`;
  }).join('');

  const yTicks = [minP, (minP+maxP)/2, maxP];
  const yTicksEl = yTicks.map(v => `
    <line x1="${pad.l}" y1="${yOf(v).toFixed(1)}" x2="${pad.l+cW}" y2="${yOf(v).toFixed(1)}" stroke="var(--border)" stroke-dasharray="3,4" stroke-width="1"/>
    <text x="${pad.l-6}" y="${(yOf(v)+4).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--text-muted)">${v.toFixed(2)}</text>
  `).join('');

  const xTickIdxs = [0, Math.floor(prices.length/2), prices.length-1];
  const xTicksEl = xTickIdxs.map(i => `<text x="${xs[i].toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="10" fill="var(--text-muted)">${(labels[i]||'').slice(5,16)}</text>`).join('');

  inner.innerHTML = `<svg width="${W}" height="${H}" style="display:block;overflow:visible" id="ticker-svg">
    <defs><linearGradient id="${fillId}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    ${yTicksEl}
    <path d="${areaPath}" fill="url(#${fillId})"/>
    <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2"/>
    ${sigMarkers}
    ${xTicksEl}
    <rect id="ticker-hover-zone" x="${pad.l}" y="${pad.t}" width="${cW}" height="${cH}" fill="transparent" style="cursor:crosshair"/>
    <line id="ticker-crosshair" x1="0" y1="${pad.t}" x2="0" y2="${pad.t+cH}" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="4,3" style="display:none"/>
  </svg>`;
  inner.style.padding = '0';

  const zone = document.getElementById('ticker-hover-zone');
  const crosshair = document.getElementById('ticker-crosshair');
  zone.addEventListener('mousemove', e => {
    const rect = zone.getBoundingClientRect();
    const idx = Math.max(0, Math.min(prices.length-1, Math.round((e.clientX - rect.left) / cW * (prices.length-1))));
    crosshair.setAttribute('x1', xs[idx].toFixed(1));
    crosshair.setAttribute('x2', xs[idx].toFixed(1));
    crosshair.style.display = '';
    const chg = ph[idx].change_24h_pct != null ? ` (${ph[idx].change_24h_pct>0?'+':''}${Number(ph[idx].change_24h_pct).toFixed(2)}%)` : '';
    tooltip.innerHTML = `<strong>$${prices[idx].toFixed(4)}</strong>${chg}<br><span style="color:var(--text-muted)">${(labels[idx]||'').slice(0,16).replace('T',' ')}</span>`;
    tooltip.style.display = '';
    const tipX = (xs[idx] + 130 > W) ? xs[idx] - 145 : xs[idx] + 12;
    tooltip.style.left = tipX + 'px';
    tooltip.style.top = (ys[idx] - 10) + 'px';
  });
  zone.addEventListener('mouseleave', () => {
    crosshair.style.display = 'none';
    tooltip.style.display = 'none';
  });
}

loadTicker();
</script>
{% endblock %}
