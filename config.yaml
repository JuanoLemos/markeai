version: "1.2.0"
alerts:
  discord:
    enabled: false
  telegram:
    daily_summary: true
    daily_summary_time: '21:00'
    enabled: false
    notify_on_entry: true
    notify_on_error: true
    notify_on_exit: true
deepseek:
  max_tokens: 4000
  model: deepseek-v4-flash
  temperature: 0.3
  timeout_seconds: 30
global:
  data_cache_ttl_minutes: 5
  log_file: orchestrator.log
  log_level: INFO
  max_retries: 3
  retry_delay_seconds: 10
layers:
  adx_regime:
    enabled: 1
    weight_forex: 0.1
    weight_polymarket: 0
    weight_stocks: 0.1
  cross_asset:
    enabled: 1
    weight_forex: 0.1
    weight_polymarket: 0
    weight_stocks: 0.1
  fundamental:
    enabled: 1
    weight_forex: 0.1
    weight_polymarket: 0
    weight_stocks: 0.2
  ict_smc:
    enabled: 1
    weight_forex: 0.15
    weight_polymarket: 0
    weight_stocks: 0.1
  macro:
    enabled: 1
    weight_forex: 0.25
    weight_polymarket: 0
    weight_stocks: 0.15
  onchain:
    enabled: 1
    weight_forex: 0.1
    weight_polymarket: 0.25
    weight_stocks: 0.1
  orderbook:
    enabled: 1
    weight_forex: 0
    weight_polymarket: 0.3
    weight_stocks: 0
  sentiment:
    enabled: 1
    weight_forex: 0.2
    weight_polymarket: 0.2
    weight_stocks: 0.25
  technical:
    enabled: 1
    weight_forex: 0.35
    weight_polymarket: 0.25
    weight_stocks: 0.3
markets:
  forex:
    check_interval_min: 60
    enabled: true
    max_position_usd: 30
    min_confidence: ''
    mode: paper
    pairs:
    - EURUSD=X
    - GBPUSD=X
    - USDJPY=X
    - USDCAD=X
    - AUDUSD=X
  polymarket:
    check_interval_min: 15
    enabled: true
    max_position_usd: 50
    max_positions_concurrent: 2
    min_confidence: ''
    mode: paper
  stocks:
    check_interval_min: 60
    enabled: true
    max_position_usd: 30
    min_confidence: ''
    mode: paper
    tickers:
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - TSLA
orchestrator:
  data_cache_ttl_minutes: 5
  log_file: orchestrator.log
  log_level: INFO
  max_retries: 3
  retry_delay_seconds: 10
profiles:
  fast:
    filters:
      adx_alignment: optional
      correlation: false
      kelly_positive: true
      min_confluence: 1
      session: true
      volatility: false
    label: Fast
    max_position_pct: 0.05
    max_total_exposure_pct: 0.4
    per_market:
      forex:
        min_confidence: 30
      polymarket:
        min_confidence: 35
      stocks:
        min_confidence: 30
    sl_default: 0.5
    sl_max_pct: 1.5
    sl_min_pct: 0.3
    tp_default: 1.5
    tp_max_pct: 3.0
    tp_min_pct: 0.5
  normal:
    filters:
      adx_alignment: required
      correlation: true
      kelly_positive: true
      min_confluence: 2
      session: true
      volatility: true
    label: Normal
    max_position_pct: 0.05
    max_total_exposure_pct: 0.4
    per_market:
      forex:
        min_confidence: 45
      polymarket:
        min_confidence: 50
      stocks:
        min_confidence: 45
    sl_default: 2.0
    sl_max_pct: 5.0
    sl_min_pct: 1.0
    tp_default: 5.0
    tp_max_pct: 10.0
    tp_min_pct: 2.0
risk:
  correlation_threshold: 0.85
  max_daily_loss_pct: 0.1
time_exit:
  default:
    base_hours: 72
    loss_hours: 48
    profit_hours: 120
    stagnant_hours: 36
  forex:
    base_hours: 96
    loss_hours: 48
    profit_hours: 168
    stagnant_hours: 36
  polymarket:
    base_hours: 336
    loss_hours: 168
    profit_hours: 504
    stagnant_hours: 72
  stocks:
    base_hours: 72
    loss_hours: 36
    profit_hours: 120
    stagnant_hours: 24
