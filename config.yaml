# ═══════════════════════════════════════════
# MarketAI - Configuración Central
# ═══════════════════════════════════════════

global:
  log_level: INFO
  log_file: orchestrator.log
  data_cache_ttl_minutes: 5
  max_retries: 3
  retry_delay_seconds: 10

markets:
  polymarket:
    enabled: true
    mode: paper
    check_interval_min: 15
    max_position_usd: 50
    max_positions_concurrent: 2

  forex:
    enabled: true
    pairs:
      - "EURUSD=X"
      - "GBPUSD=X"
      - "USDJPY=X"
      - "USDCAD=X"
      - "AUDUSD=X"
    mode: paper
    check_interval_min: 60
    max_position_usd: 30

  stocks:
    enabled: true
    tickers:
      - "SPY"
      - "QQQ"
      - "AAPL"
      - "MSFT"
      - "GOOGL"
      - "AMZN"
      - "TSLA"
    mode: paper
    check_interval_min: 60
    max_position_usd: 30

layers:
  technical:    { enabled: true, weight_polymarket: 0.25, weight_forex: 0.35, weight_stocks: 0.30 }
  onchain:      { enabled: true, weight_polymarket: 0.25, weight_forex: 0.10, weight_stocks: 0.10 }
  sentiment:    { enabled: true, weight_polymarket: 0.20, weight_forex: 0.20, weight_stocks: 0.25 }
  orderbook:    { enabled: true, weight_polymarket: 0.30, weight_forex: 0.00, weight_stocks: 0.00 }
  fundamental:  { enabled: true, weight_polymarket: 0.00, weight_forex: 0.10, weight_stocks: 0.20 }
  cross_asset:  { enabled: true, weight_polymarket: 0.00, weight_forex: 0.10, weight_stocks: 0.10 }
  ict_smc:      { enabled: true, weight_polymarket: 0.00, weight_forex: 0.15, weight_stocks: 0.10 }
  adx_regime:   { enabled: true, weight_polymarket: 0.00, weight_forex: 0.10, weight_stocks: 0.10 }
  macro:        { enabled: true, weight_polymarket: 0.00, weight_forex: 0.25, weight_stocks: 0.15 }

risk:
  max_daily_loss_pct: 0.10
  correlation_threshold: 0.85

profiles:
  normal:
    label: "Normal"
    max_position_pct: 0.05
    max_total_exposure_pct: 0.40
    sl_min_pct: 1.0
    sl_max_pct: 5.0
    tp_min_pct: 2.0
    tp_max_pct: 10.0
    sl_default: 2.0
    tp_default: 5.0
    per_market:
      polymarket: { min_confidence: 50 }
      forex:      { min_confidence: 45 }
      stocks:     { min_confidence: 45 }
    filters:
      min_confluence: 2
      adx_alignment: required
      session: true
      correlation: true
      volatility: true
      kelly_positive: true
  fast:
    label: "Fast"
    max_position_pct: 0.05
    max_total_exposure_pct: 0.40
    sl_min_pct: 0.3
    sl_max_pct: 1.5
    tp_min_pct: 0.5
    tp_max_pct: 3.0
    sl_default: 0.5
    tp_default: 1.5
    per_market:
      polymarket: { min_confidence: 35 }
      forex:      { min_confidence: 30 }
      stocks:     { min_confidence: 30 }
    filters:
      min_confluence: 1
      adx_alignment: optional
      session: true
      correlation: false
      volatility: false
      kelly_positive: true

time_exit:
  forex:      { base_hours: 96, profit_hours: 168, loss_hours: 48, stagnant_hours: 36 }
  stocks:     { base_hours: 72, profit_hours: 120, loss_hours: 36, stagnant_hours: 24 }
  polymarket: { base_hours: 336, profit_hours: 504, loss_hours: 168, stagnant_hours: 72 }
  default:    { base_hours: 72, profit_hours: 120, loss_hours: 48, stagnant_hours: 36 }

deepseek:
  model: deepseek-v4-pro
  temperature: 0.3
  max_tokens: 4000
  timeout_seconds: 30

alerts:
  telegram:
    enabled: false
    notify_on_entry: true
    notify_on_exit: true
    notify_on_error: true
    daily_summary: true
    daily_summary_time: "21:00"
  discord:
    enabled: false

orchestrator:
  log_level: INFO
  log_file: orchestrator.log
  data_cache_ttl_minutes: 5
  max_retries: 3
  retry_delay_seconds: 10
